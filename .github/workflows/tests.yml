name: Run Tests with Allure Report

# Когда запускать
on:
  push:
    branches: [ main, develop ]  # при push в эти ветки
  pull_request:
    branches: [ main ]           # при создании PR
  workflow_dispatch:              # можно запустить вручную

jobs:
  test:
    runs-on: ubuntu-latest        # используем Ubuntu

    steps:
      - name: Checkout code       # скачиваем код
        uses: actions/checkout@v4

      - name: Set up JDK 11       # устанавливаем Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies  # кэшируем зависимости
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests with Maven  # запускаем тесты
        run: mvn clean test

      # Сохраняем результаты тестов как артефакт (на всякий случай)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: |
            **/target/allure-results
            !**/target/allure-results/history
          retention-days: 7

      # ПОЛУЧАЕМ ИСТОРИЮ ИЗ ВЕТКИ GH-PAGES
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # ГЕНЕРИРУЕМ ОТЧЕТ ALLURE С ИСТОРИЕЙ
      - name: Allure Report with history
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # ПУБЛИКУЕМ ОТЧЕТ НА GITHUB PAGES
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true