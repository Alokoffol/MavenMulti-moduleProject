name: Run Tests with Allure Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Тестируем ТОЛЬКО common и api
      - name: Run tests with Maven
        run: mvn clean test -pl common,api

      # Сохраняем результаты Allure
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: '**/target/allure-results'
          retention-days: 7

      # Альтернатива: публикуем результаты как отдельный артефакт для Pages
      - name: Upload static files for GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: '**/target/allure-results'

  # Отдельная job для деплоя на Pages
  deploy:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4